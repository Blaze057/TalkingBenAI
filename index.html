<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talking Ben AI</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        #game-viewport {
            width: 1024px;
            height: 1536px;
            position: relative;
            background-color: #f0f8ff; 
            overflow: hidden;
            transform-origin: center;
        }

        /* Усі медіа лежать в одному шарі, абсолютно накладені один на одного */
        .sprite, .video-animation {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            object-fit: cover;
            user-select: none;
            -webkit-user-drag: none;
            
            /* Плавний перехід між станами через прозорість */
            opacity: 0;
            z-index: 1;
            transition: opacity 0.25s ease-in-out;
            pointer-events: none;
        }

        /* Клас активного стану: робимо елемент видимим та піднімаємо його наверх */
        .active-state {
            opacity: 1;
            z-index: 5;
            pointer-events: auto;
        }

        #phone-trigger {
            position: absolute;
            left: 20px;
            top: 805px;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 9999; 
        }

        #debug-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 320px;
            background-color: rgba(0, 0, 0, 0.85);
            border: 2px solid #00ffcc;
            border-radius: 12px;
            padding: 15px;
            color: #fff;
            font-size: 14px;
            z-index: 10000; 
            pointer-events: auto;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        #debug-panel h3 {
            color: #00ffcc;
            margin-bottom: 10px;
            border-bottom: 1px solid #00ffcc;
            padding-bottom: 5px;
            font-size: 16px;
        }

        .debug-row {
            margin-bottom: 8px;
        }

        .debug-label {
            font-weight: bold;
            color: #aaa;
        }

        .debug-value {
            color: #fff;
            word-wrap: break-word;
        }

        #volume-bar-container {
            width: 100%;
            height: 10px;
            background-color: #333;
            border-radius: 5px;
            margin-top: 5px;
            overflow: hidden;
        }

        #volume-bar {
            width: 0%;
            height: 100%;
            background-color: #00ff00;
            transition: width 0.1s ease;
        }

        #change-key-btn {
            background-color: #ff3333;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
            font-size: 11px;
            width: 100%;
        }

        #change-key-btn:hover {
            background-color: #cc0000;
        }

        .status-active { color: #00ff00; }
        .status-idle { color: #ffcc00; }
        .status-error { color: #ff3333; }
    </style>
</head>
<body>

    <div id="game-viewport">
        
        <!-- Спрайти (Фото-заглушки). Головний старт задано через active-state -->
        <img id="sprite-stand" class="sprite active-state" src="bens/stand.png" alt="Ben Standing">
        <img id="sprite-listen" class="sprite" src="bens/listen.png" alt="Ben Listening">
        <img id="sprite-think" class="sprite" src="bens/think.png" alt="Ben Thinking">

        <!-- Відео анімації станів та переходів -->
        <video id="video-call" class="video-animation" playsinline><source src="bens/call.mp4" type="video/mp4"></video>
        <video id="video-drop" class="video-animation" playsinline><source src="bens/drop.mp4" type="video/mp4"></video>
        <video id="video-ambient" class="video-animation" playsinline><source src="bens/ambient.mp4" type="video/mp4"></video>
        <video id="video-thinking" class="video-animation" playsinline><source src="bens/thinking.mp4" type="video/mp4"></video>
        <video id="video-stopthink" class="video-animation" playsinline><source src="bens/stopthink.mp4" type="video/mp4"></video>

        <!-- Відео анімації реакцій відповіді ШІ -->
        <video id="video-yes" class="video-animation" playsinline><source src="bens/Yes.mp4" type="video/mp4"></video>
        <video id="video-no" class="video-animation" playsinline><source src="bens/No.mp4" type="video/mp4"></video>
        <video id="video-hohoho" class="video-animation" playsinline><source src="bens/Hohoho.mp4" type="video/mp4"></video>
        <video id="video-ugh" class="video-animation" playsinline><source src="bens/Ugh.mp4" type="video/mp4"></video>

        <!-- Пул відрижок (Burps) -->
        <video id="video-burp1" class="video-animation" playsinline><source src="bens/burp1.mp4" type="video/mp4"></video>
        <video id="video-burp2" class="video-animation" playsinline><source src="bens/burp2.mp4" type="video/mp4"></video>
        <video id="video-burp3" class="video-animation" playsinline><source src="bens/burp3.mp4" type="video/mp4"></video>
        <video id="video-burp4" class="video-animation" playsinline><source src="bens/burp4.mp4" type="video/mp4"></video>

        <div id="phone-trigger"></div>

        <div id="debug-panel">
            <h3>Talking Ben AI — Монітор</h3>
            <div class="debug-row">
                <span class="debug-label">Стан гри:</span>
                <span id="debug-state" class="debug-value">очікування</span>
            </div>
            <div class="debug-row">
                <span class="debug-label">Мікрофон:</span>
                <span id="debug-mic" class="debug-value status-idle">вимкнено</span>
            </div>
            <div class="debug-row">
                <span class="debug-label">Гучність:</span>
                <span id="debug-volume-val">0</span>
                <div id="volume-bar-container">
                    <div id="volume-bar"></div>
                </div>
            </div>
            <div class="debug-row">
                <span class="debug-label">Ти сказав:</span>
                <p id="debug-user-text" class="debug-value">—</p>
            </div>
            <div class="debug-row">
                <span class="debug-label">Бен вибрав (ШІ):</span>
                <p id="debug-ben-reply" class="debug-value" style="color: #00ffcc; font-weight: bold; font-size: 16px;">—</p>
            </div>
            <button id="change-key-btn">Змінити/Видалити API Key</button>
        </div>

    </div>

    <script>
        let GEMINI_API_KEY = localStorage.getItem("gemini_key");

        function checkApiKey() {
            if (!GEMINI_API_KEY) {
                const keyInput = prompt("Будь ласка, введи свій Gemini API Key для гри (він збережеться лише у твоєму браузері):");
                if (keyInput) {
                    GEMINI_API_KEY = keyInput.trim();
                    localStorage.setItem("gemini_key", GEMINI_API_KEY);
                } else {
                    alert("Без API-ключа штучний інтелект Бена не зможе працювати!");
                }
            }
        }

        document.getElementById("change-key-btn").addEventListener("click", () => {
            const newKey = prompt("Введи новий Gemini API Key (або залиш порожнім для видалення):", GEMINI_API_KEY || "");
            if (newKey !== null) {
                if (newKey.trim() === "") {
                    localStorage.removeItem("gemini_key");
                    GEMINI_API_KEY = null;
                    alert("Ключ видалено з пам'яті.");
                } else {
                    GEMINI_API_KEY = newKey.trim();
                    localStorage.setItem("gemini_key", GEMINI_API_KEY);
                    alert("Новий ключ успешно збережено!");
                }
            }
        });

        let gameState = "очікування"; 
        let isAnimating = false; 
        let ambientTimer = null;

        const standSprite = document.getElementById("sprite-stand");
        const listenSprite = document.getElementById("sprite-listen");
        const thinkSprite = document.getElementById("sprite-think");

        const callVideo = document.getElementById("video-call");
        const dropVideo = document.getElementById("video-drop");
        const ambientVideo = document.getElementById("video-ambient");
        const thinkingVideo = document.getElementById("video-thinking");
        const stopthinkVideo = document.getElementById("video-stopthink");

        const yesVideo = document.getElementById("video-yes");
        const noVideo = document.getElementById("video-no");
        const hohohoVideo = document.getElementById("video-hohoho");
        const ughVideo = document.getElementById("video-ugh");

        const burpVideos = [
            document.getElementById("video-burp1"),
            document.getElementById("video-burp2"),
            document.getElementById("video-burp3"),
            document.getElementById("video-burp4")
        ];

        const phoneTrigger = document.getElementById("phone-trigger");
        const gameViewport = document.getElementById("game-viewport");

        const debugState = document.getElementById("debug-state");
        const debugMic = document.getElementById("debug-mic");
        const debugUserText = document.getElementById("debug-user-text");
        const debugBenReply = document.getElementById("debug-ben-reply");
        const volumeBar = document.getElementById("volume-bar");
        const debugVolumeVal = document.getElementById("debug-volume-val");

        const allVisuals = [
            standSprite, listenSprite, thinkSprite,
            callVideo, dropVideo, ambientVideo, thinkingVideo, stopthinkVideo,
            yesVideo, noVideo, hohohoVideo, ughVideo,
            ...burpVideos
        ];

        // Попереднє завантаження для кешу
        const imagesToPreload = ["bens/stand.png", "bens/listen.png", "bens/think.png"];
        imagesToPreload.forEach(src => {
            const img = new Image();
            img.src = src;
        });

        // ПЛАВНЕ ПЕРЕМИКАННЯ ЧЕРЕЗ OPACITY (БЕЗ СПАЛАХІВ)
        function showOnly(elementToShow) {
            allVisuals.forEach(el => {
                if (el !== elementToShow) {
                    el.classList.remove("active-state");
                }
            });
            elementToShow.classList.add("active-state");
        }

        let audioContext;
        let analyser;
        let microphoneStream;
        let javascriptNode;
        
        const SILENCE_THRESHOLD = 8; 
        const SILENCE_DURATION = 1500; 
        let silenceStartTime = null;
        let isUserSpeaking = false; 
        let finalTranscript = "";

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;
        let micPermissionGranted = false;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = true; 
            recognition.interimResults = true; 
            recognition.lang = 'uk-UA'; 

            recognition.onstart = () => {
                updateMicStatus("слухає...", "status-active");
                finalTranscript = ""; 
                isUserSpeaking = false;
                silenceStartTime = null;
                startAmbientTimer(); 
            };

            recognition.onend = () => {
                updateMicStatus("очікування фрази", "status-idle");
                stopAmbientTimer();
            };

            recognition.onerror = (event) => {
                console.log("Помилка розпізнавання:", event.error);
                if (event.error === 'not-allowed') {
                    updateMicStatus("немає доступу до мікрофона", "status-error");
                }
            };

            recognition.onresult = (event) => {
                let interimTranscript = "";
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript + " ";
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }
                
                const displaySpeech = finalTranscript || interimTranscript;
                if (displaySpeech.trim()) {
                    debugUserText.textContent = displaySpeech;
                    isUserSpeaking = true; 
                }
            };
        }

        async function setupAudioAnalyser(stream) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            microphoneStream = audioContext.createMediaStreamSource(stream);
            javascriptNode = audioContext.createScriptProcessor(2048, 1, 1);

            analyser.smoothingTimeConstant = 0.8;
            analyser.fftSize = 1024;

            microphoneStream.connect(analyser);
            analyser.connect(javascriptNode);
            javascriptNode.connect(audioContext.destination);

            javascriptNode.onaudioprocess = () => {
                const array = new Uint8Array(analyser.frequencyBinCount);
                analyser.getByteFrequencyData(array);
                
                let values = 0;
                const length = array.length;
                for (let i = 0; i < length; i++) {
                    values += array[i];
                }
                const averageVolume = Math.round(values / length);

                volumeBar.style.width = Math.min(averageVolume * 2, 100) + "%";
                debugVolumeVal.textContent = averageVolume;

                if (gameState === "розмова" && !isAnimating) {
                    if (averageVolume < SILENCE_THRESHOLD) {
                        if (silenceStartTime === null) {
                            silenceStartTime = Date.now();
                        } else {
                            const elapsedSilence = Date.now() - silenceStartTime;
                            if (elapsedSilence > SILENCE_DURATION && isUserSpeaking) {
                                console.log("Тиша виявлена!");
                                stopListeningAndSend();
                            }
                        }
                    } else {
                        silenceStartTime = null;
                        isUserSpeaking = true; 
                    }
                }
            };
        }

        async function stopListeningAndSend() {
            if (recognition) { 
                try { recognition.stop(); } catch(e) {}
            }
            isUserSpeaking = false;
            silenceStartTime = null;

            const textToSend = debugUserText.textContent.trim();
            
            if (!textToSend || textToSend === "—" || textToSend === "." || textToSend === "?") {
                console.log("Нерозбірливо. Скидання на дефолт.");
                debugBenReply.textContent = "Нерозбірливо -> 'No'";
                playBenReaction("No");
            } else {
                await askGeminiBen(textToSend);
            }
        }

        function startAmbientTimer() {
            stopAmbientTimer();
            if (gameState !== "розмова" || isAnimating) return;

            const randomTime = Math.floor(Math.random() * (10000 - 5000 + 1)) + 5000; 
            ambientTimer = setTimeout(() => {
                playAmbientVideo();
            }, randomTime);
        }

        function stopAmbientTimer() {
            if (ambientTimer) {
                clearTimeout(ambientTimer);
                ambientTimer = null;
            }
        }

        function playAmbientVideo() {
            if (isAnimating || gameState !== "розмова") return;
            isAnimating = true;
            stopAmbientTimer();

            showOnly(ambientVideo);
            ambientVideo.currentTime = 0;
            ambientVideo.play().catch(e => {
                isAnimating = false;
                startAmbientTimer();
            });
        }

        ambientVideo.addEventListener("ended", () => {
            isAnimating = false;
            if (gameState === "розмова") {
                showOnly(listenSprite);
                startAmbientTimer();
            }
        });

        async function requestMicrophone() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                micPermissionGranted = true;
                updateMicStatus("доступ дозволено", "status-idle");
                await setupAudioAnalyser(stream);
            } catch (err) {
                console.error("Помилка доступу до мікрофона:", err);
                updateMicStatus("доступ заборонено", "status-error");
            }
        }

        function updateMicStatus(text, className) {
            debugMic.textContent = text;
            debugMic.className = "debug-value " + className;
        }

        function updateGameState(state) {
            gameState = state;
            debugState.textContent = state;
        }

        function resizeGame() {
            const scaleX = window.innerWidth / 1024;
            const scaleY = window.innerHeight / 1536;
            gameViewport.style.transform = `scale(${Math.min(scaleX, scaleY)})`;
        }

        window.addEventListener('resize', resizeGame);
        window.addEventListener('load', async () => {
            resizeGame();
            checkApiKey(); 
            await requestMicrophone(); 
        });

        phoneTrigger.addEventListener("click", () => {
            if (isAnimating) return;
            
            if (!GEMINI_API_KEY) {
                checkApiKey();
                return;
            }

            if (gameState === "очікування") {
                isAnimating = true;
                stopAmbientTimer();
                showOnly(callVideo);
                callVideo.currentTime = 0;
                callVideo.play().catch(err => {
                    isAnimating = false;
                });
            } else if (gameState === "розмова") {
                triggerHangUp();
            }
        });

        function triggerHangUp() {
            isAnimating = true;
            stopAmbientTimer();
            if (recognition) {
                try { recognition.stop(); } catch(e) {}
            }

            showOnly(dropVideo);
            dropVideo.currentTime = 0;
            dropVideo.play().catch(err => {
                isAnimating = false;
            });
        }

        callVideo.addEventListener("ended", () => {
            updateGameState("розмова");
            isAnimating = false;
            showOnly(listenSprite);

            if (recognition && micPermissionGranted) {
                try {
                    debugUserText.textContent = "—";
                    debugBenReply.textContent = "—";
                    recognition.start();
                } catch(e) {}
            }
        });

        dropVideo.addEventListener("ended", () => {
            updateGameState("очікування");
            isAnimating = false;
            showOnly(standSprite);
            debugUserText.textContent = "—";
            debugBenReply.textContent = "—";
        });

        // ==========================================
        // 🤖 ІНТЕГРАЦІЯ З ШІ ТА НАДІЙНИЙ ЗАХИСТ ВІД TYPEERROR
        // ==========================================
        async function askGeminiBen(userText) {
            isAnimating = true;
            stopAmbientTimer();
            debugBenReply.textContent = "Бен думає...";
            
            showOnly(thinkingVideo);
            thinkingVideo.currentTime = 0;
            thinkingVideo.play();

            const onThinkingEnded = () => {
                thinkingVideo.removeEventListener("ended", onThinkingEnded);
                if (isAnimating) { showOnly(thinkSprite); }
            };
            thinkingVideo.addEventListener("ended", onThinkingEnded);

            if (!GEMINI_API_KEY) {
                debugBenReply.textContent = "Помилка: Немає API ключа!";
                return;
            }

            const url = `https://generativelanguage.googleapis.com/v1/models/gemini-3.5-flash:generateContent?key=${GEMINI_API_KEY}`;

            const systemPrompt = `You are Benjamin (Ben), a 43-year-old genius scientist, chemist, and computer programmer[cite: 1]. 
Your creator and father is the Ukrainian 3D artist Andrey Kravchenko, who designed you with love before your license was acquired by Outfit7.
You spend your life in your lab doing crazy chemistry experiments, elements research, and explosions. You are highly intelligent but possess a fierce, violent temper. 
You absolutely love pulling pranks on others, especially on your best friend Tom (who was once your worst chemistry student). 
You have a girlfriend named Xenon. You get furious if someone touches your lab equipment or calls you a "cute puppy".

CRITICAL INSTRUCTION: Analyze the user's statement and reply with EXACTLY ONE of the following reaction words depending on the context:
- "Yes" -> If you agree, find it scientifically accurate, or reply positively.
- "No" -> If you disagree, find it absurd, or refuse the user's input.
- "Ho-ho-ho!" -> If the user tells a joke, says something funny, or if you are planning a mischievous prank (especially on Tom).
- "Ugh..." -> If the user is being boring, repetitive, socially awkward, or asks basic questions.
- "Hang up" -> If the user heavily insults you, insults your science, insults your father Andrey Kravchenko, or uses forbidden/extremely offensive language.
- "Belch" -> If the user says something absolutely garbage, boring, cringy, offers you a terrible drink/idea, or talks about complete trash topics.

STRICT RULE: Output ONLY the reaction word itself. No extra words, no explanations, no markdown punctuation outside the option string.`;

            const fullPrompt = `${systemPrompt}\n\nUser says: "${userText}"\nDecision:`;
            const requestBody = {
                contents: [{ parts: [{ text: fullPrompt }] }],
                generationConfig: { temperature: 0.6, maxOutputTokens: 20 }
            };

            try {
                const response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(requestBody)
                });
                
                const data = await response.json();
                
                // 🔥 НАДІЙНА ПЕРЕВІРКА: спочатку перевіряємо структуру даних, щоб уникнути вильоту в коді
                if (!data || data.error || !data.candidates || !data.candidates[0] || !data.candidates[0].content || !data.candidates[0].content.parts || !data.candidates[0].content.parts[0]) {
                    throw new Error("Невідома або зламана структура JSON від сервера");
                }

                // Лише тепер безпечно витягуємо рядок відповіді ШІ
                let benDecision = data.candidates[0].content.parts[0].text;
                if (typeof benDecision === 'string') {
                    benDecision = benDecision.trim().replace(/[^a-zA-Z!\-\s]/g, "").trim();
                } else {
                    benDecision = "No";
                }
                
                debugBenReply.textContent = benDecision;
                console.log("Рішення ШІ:", benDecision);

                showOnly(stopthinkVideo);
                stopthinkVideo.currentTime = 0;
                stopthinkVideo.play();

                stopthinkVideo.addEventListener("ended", function onStopThinkEnded() {
                    stopthinkVideo.removeEventListener("ended", onStopThinkEnded);
                    playBenReaction(benDecision);
                });

            } catch (error) {
                console.error("Захисний блок перехопив збій мережі/парсингу:", error);
                debugBenReply.textContent = "Помилка відповіді -> 'No'";
                
                showOnly(stopthinkVideo);
                stopthinkVideo.currentTime = 0;
                stopthinkVideo.play();
                
                stopthinkVideo.addEventListener("ended", function onFaultEnded() {
                    stopthinkVideo.removeEventListener("ended", onFaultEnded);
                    playBenReaction("No"); 
                });
            }
        }

        function playBenReaction(decision) {
            let targetVideo = null;
            const check = String(decision).toLowerCase();

            if (check.includes("yes")) {
                targetVideo = yesVideo;
            } else if (check.includes("no")) {
                targetVideo = noVideo;
            } else if (check.includes("ho") || check.includes("laugh")) {
                targetVideo = hohohoVideo;
            } else if (check.includes("ugh")) {
                targetVideo = ughVideo;
            } else if (check.includes("belch") || check.includes("burp")) {
                const randomIndex = Math.floor(Math.random() * burpVideos.length);
                targetVideo = burpVideos[randomIndex];
            } else if (check.includes("hang")) {
                triggerHangUp();
                return;
            } else {
                targetVideo = noVideo; 
            }

            showOnly(targetVideo);
            targetVideo.currentTime = 0;
            targetVideo.play();

            targetVideo.addEventListener("ended", function onReactionEnded() {
                targetVideo.removeEventListener("ended", onReactionEnded);
                
                isAnimating = false;
                showOnly(listenSprite);
                
                if (gameState === "розмова") {
                    try {
                        debugUserText.textContent = "—";
                        debugBenReply.textContent = "—";
                        recognition.start();
                    } catch(e) {}
                }
            });
        }
    </script>
</body>
</html>
